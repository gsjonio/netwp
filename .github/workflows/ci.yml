name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.24"
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

  # The race detector needs cgo (a C toolchain), which the dev machine lacks, so
  # it can't be part of the local `go test ./...` check. ubuntu-latest ships GCC,
  # so run it here to catch data races in the concurrent discovery/enrichment
  # paths that the plain test run can't see.
  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.24"
      - run: go test -race ./...
        env:
          CGO_ENABLED: "1"

  # Short fuzzing pass over the DNS/mDNS/ARP wire parsers, which consume bytes
  # off the network from untrusted hosts. 15s per target won't exhaust the input
  # space, but it explores a bit more on every push and fails loudly on a crash.
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.24"
      - run: go test ./internal/adapter/namelookup -run=x -fuzz=FuzzReadName -fuzztime=15s
      - run: go test ./internal/adapter/namelookup -run=x -fuzz=FuzzParsePTRAnswer -fuzztime=15s
      - run: go test ./internal/adapter/namelookup -run=x -fuzz=FuzzPtrServiceLabels -fuzztime=15s
      - run: go test ./internal/adapter/arpscan -run=x -fuzz=FuzzParseARPReply -fuzztime=15s

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
