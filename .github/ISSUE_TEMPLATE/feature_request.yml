name: Feature request
description: Suggest a command, flag, or behavior for netwp.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that netwp does not cover today?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What you have in mind
      description: A command, flag, or behavior. A rough sketch is fine.
    validations:
      required: false
