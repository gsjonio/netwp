name: Bug report
description: Something in netwp does not work as documented.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you ran, what you expected, and what you got instead.
      placeholder: |
        I ran `netwp scan` and ...
        I expected ...
        Instead ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: netwp version
      description: Output of `netwp version`.
      placeholder: netwp v1.19.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Windows
        - Linux
        - Other (say which below)
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Terminal, network setup, logs, or output. Redact anything private.
    validations:
      required: false
